<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minhas Redes Sociais</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="shortcut icon" href="Logo2.png.png" type="image/x-icon" />
    <meta
      name="description"
      content="Página pessoal de Junior Silva, mostrando suas redes sociais, um vídeo em destaque e sua música favorita."
    />
  </head>
  <body class="gradient-bg">
    <div class="container">
      <img
        src="Retrato digital de jovem hacker.png"
        alt="Foto de perfil"
        class="profile-image"
      />

      <h2 class="username">@Juniorsilva_dev</h2>

      <a
        href="https://juniordevti.github.io/meusitepessoal/"
        target="_blank"
        class="link-button btn-website"
        >🌐 Website</a
      >
      <a
        href="https://www.instagram.com/juniorsilva_dev/"
        target="_blank"
        class="link-button btn-instagram"
        >📸 Instagram</a
      >
      <a
        href="https://www.youtube.com/@Junior_devTI"
        class="link-button btn-youtube"
        target="_blank"
        >🎥 YouTube</a
      >
      <a
        href="https://open.spotify.com/user/31cgzuxg2cgjnaqr6whxnkrx723a?si=515785f3e3e849f1"
        target="_blank"
        class="link-button btn-spotify"
        >🎵 Spotify</a
      >
      <a
        href="https://www.linkedin.com/in/junior-dev-624840243/"
        target="_blank"
        class="link-button btn-linkedin"
      >
        💼 Linkedin
      </a>

      <a
        href="https://discord.gg/gygCEFzejz"
        target="_blank"
        class="link-button btn-discord-server"
      >
        🟣 Servidor Discord
      </a>
      <a
        href="https://github.com/juniordevti"
        target="_blank"
        class="link-button btn-github"
      >
        🐱 Github
      </a>
      <section class="extras">
        <div class="video-card">
          <h2>Video em Destaque</h2>
          <div class="video-wrapper">
            <iframe
              width="560"
              height="315"
              src="https://www.youtube.com/embed/1tt3329cez0?si=eu4j841bS8M-5ZjA"
              title="YouTube video player"
              frameborder="0"
              allowfullscreen
            ></iframe>
          </div>
        </div>

        <div class="music-card">
          <h2>🎵 Música favorita</h2>
          <div class="music-box">
            <img
              src="https://i.scdn.co/image/ab67616d0000b273909119d7b412d563d0986a2d"
              alt="Capa da música"
              class="music-cover"
            />

            <div class="music-info">
              <h3>Maduk Alone</h3>
              <p>Maduk</p>
              <a
                href="https://open.spotify.com/user/31cgzuxg2cgjnaqr6whxnkrx723a?si=bc90bc15b7174443"
                target="_blank"
                class="music-btn"
              >
                Ouvir no Spotify
              </a>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
