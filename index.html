<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minhas Redes Sociais</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="gradient-bg">
    <div class="container">
      <img src="logo.jpeg" alt="Foto de perfil" class="profile-image" />

      <h2 class="username">Valdernandes Pereira da Silva Júnior</h2>

      <a
        href="https://juniordevti.github.io/meusitepessoal/"
        target="_blank"
        class="link-button btn-website"
        >🌐 Website</a
      >
      <a
        href="https://www.instagram.com/juniorsilva_dev/"
        target="_blank"
        class="link-button btn-instagram"
        >📸 Instagram</a
      >
      <a
        href="https://www.youtube.com/@Junior_devTI"
        class="link-button btn-youtube"
        target="_blank"
        >🎥 YouTube</a
      >
      <a
        href="https://open.spotify.com/user/31cgzuxg2cgjnaqr6whxnkrx723a?si=515785f3e3e849f1"
        target="_blank"
        class="link-button btn-spotify"
        >🎵 Spotify</a
      >
      <a
        href="https://www.linkedin.com/in/junior-dev-624840243/"
        target="_blank"
        class="link-button btn-linkedin"
      >
        💼 Linkedin
      </a>

      <a
        href="https://discord.gg/gygCEFzejz"
        target="_blank"
        class="link-button btn-discord-server"
      >
        🟣 Servidor Discord
      </a>
      <a
        href="https://github.com/juniordevti"
        target="_blank"
        class="link-button btn-github"
      >
        🐱 Github
      </a>
    </div>
    <section class="extras">
  <div class="video-card">
    <h2>🎥 Vídeo em destaque</h2>
    <div class="video-wrapper">
      <iframe
        src="https://www.youtube.com/embed/SEU_VIDEO_ID"
        title="Vídeo em destaque"
        frameborder="0"
        allowfullscreen
      ></iframe>
    </div>
  </div>

  <div class="music-card">
    <h2>🎵 Música favorita</h2>
    <div class="music-box">
      <img src="sua-capa.jpg" alt="Capa da música" class="music-cover" />

      <div class="music-info">
        <h3>Nome da Música</h3>
        <p>Nome do Artista</p>
        <a
          href="https://open.spotify.com/track/SEU_LINK"
          target="_blank"
          class="music-btn"
        >
          Ouvir no Spotify
        </a>
      </div>
    </div>
  </div>
</section>
    <script src="script.js"></script>
  </body>
</html>
